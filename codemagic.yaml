workflows:
  android-workflow:
    name: Android Release Build
    max_build_duration: 120
    environment:
      node: 22
      java: 17
    scripts:
      - name: Install npm dependencies
        script: npm install --legacy-peer-deps
      - name: Build web app and sync to native
        script: npm run mobile:sync
      - name: Build Android release APK
        script: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab
    publishing:
      email:
        recipients:
          - your_email@example.com

  ios-workflow:
    name: MUMMS iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: 22
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm install --legacy-peer-deps

      - name: Build web app
        script: npm run build

      - name: Add iOS platform
        script: |
          npx cap add ios || true

      - name: Sync iOS
        script: |
          npx cap sync ios
          find . -name Podfile

      - name: Build unsigned IPA for Sideloadly
        script: |
          cd ios/App

          xcodebuild build \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

          mkdir -p build/Payload
          cp -R ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/App.app build/Payload/
          cd build
          zip -r App-unsigned.ipa Payload
    artifacts:
      - ios/App/build/*.ipa
    publishing:
      email:
        recipients:
          - your_email@example.com